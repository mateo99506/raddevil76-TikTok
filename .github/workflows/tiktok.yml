name: TikTok Scraper

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Clone repository with PAT
      run: |
        git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git repo
        cp -r repo/* ${GITHUB_WORKSPACE}/
        ls -la ${GITHUB_WORKSPACE}

    - name: Ensure memory.txt exists
      run: |
        if [ ! -f ${GITHUB_WORKSPACE}/memory.txt ]; then
          echo "Creating empty memory.txt"
          touch ${GITHUB_WORKSPACE}/memory.txt
        fi

    - name: Install Python
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip
        python3 -m pip install --upgrade pip
        pip install requests

    - name: Run TikTok scraper
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python3 ${GITHUB_WORKSPACE}/tiktok.py

    - name: Commit updated memory.txt to repo
      run: |
        cd ${GITHUB_WORKSPACE}
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add memory.txt
        git commit -m "Update memory" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git HEAD:main

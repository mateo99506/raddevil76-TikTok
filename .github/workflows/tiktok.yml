name: TikTok Scraper

permissions:
  contents: write

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0   # pełna historia repo

    - name: Switch to main branch
      run: |
        git checkout main

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run TikTok scraper
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python tiktok.py

    - name: Commit cache file if exists
      run: |
        if [ -f last.txt ]; then
          echo "Cache file found. Committing..."
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add last.txt
          git commit -m "Update cache"

          # Pobierz najnowsze zmiany z main
          git pull origin main --rebase

          # Wypchnij commit na main
          git push origin main
        else
          echo "Cache file not found. Skipping commit."
        fi

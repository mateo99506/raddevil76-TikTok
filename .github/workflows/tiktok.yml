name: TikTok Scraper

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Manual checkout (no Node.js)
      run: |
        git clone https://github.com/${GITHUB_REPOSITORY}.git repo
        cd repo
        cp -r . ../
        cd ..

    - name: Install Python manually
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip
        python3 -m pip install --upgrade pip
        pip install requests

    - name: Diagnostyka środowiska
      run: |
        echo "=== Bieżący katalog ==="
        pwd
        echo "=== Lista plików ==="
        ls -la
        echo "=== Uprawnienia katalogu ==="
        stat .
        echo "=== Zmienna DISCORD_WEBHOOK ==="
        if [ -z "$DISCORD_WEBHOOK" ]; then
          echo "DISCORD_WEBHOOK jest pusta!"
        else
          echo "DISCORD_WEBHOOK istnieje (wartość ukryta)"
        fi

    - name: Run TikTok scraper
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python3 tiktok.py

name: TikTok Scraper

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Clone repository into workspace (no Node.js)
      run: |
        git clone https://github.com/${GITHUB_REPOSITORY}.git ${GITHUB_WORKSPACE}
        ls -la ${GITHUB_WORKSPACE}

    - name: Create empty memory.txt if missing
      run: |
        if [ ! -f ${GITHUB_WORKSPACE}/memory.txt ]; then
          echo "Creating empty memory.txt"
          touch ${GITHUB_WORKSPACE}/memory.txt
        else
          echo "memory.txt already exists"
        fi

    - name: Download memory.txt artifact (if exists)
      uses: actions/download-artifact@v4
      with:
        name: memory
        path: ${GITHUB_WORKSPACE}
      continue-on-error: true

    - name: Install Python manually
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip
        python3 -m pip install --upgrade pip
        pip install requests

    - name: Run TikTok scraper
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python3 ${GITHUB_WORKSPACE}/tiktok.py

    - name: Upload updated memory.txt
      uses: actions/upload-artifact@v4
      with:
        name: memory
        path: ${GITHUB_WORKSPACE}/memory.txt

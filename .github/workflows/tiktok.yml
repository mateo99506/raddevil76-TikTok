name: TikTok Checker

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    # ------------------------------------------------------------
    # Clone repository into ./repo using PAT_TOKEN
    # This gives full read/write access for commits and pushes.
    # ------------------------------------------------------------
    - name: Clone repository with PAT
      run: |
        git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git repo
        ls -la repo

    # ------------------------------------------------------------
    # Install Python 3.11
    # ------------------------------------------------------------
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # ------------------------------------------------------------
    # Install required Python dependencies
    # ------------------------------------------------------------
    - name: Install dependencies
      run: |
        pip install requests pillow

    # ------------------------------------------------------------
    # Run the TikTok script inside the cloned repo folder
    # ------------------------------------------------------------
    - name: Run TikTok script
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        cd repo
        python tiktok.py

    # ------------------------------------------------------------
    # Commit updated memory.txt from inside ./repo
    # Push using PAT_TOKEN (explicit URL)
    # ------------------------------------------------------------
    - name: Commit updated memory.txt to repo
      run: |
        cd repo
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add memory.txt
        git commit -m "Update memory" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git HEAD:main

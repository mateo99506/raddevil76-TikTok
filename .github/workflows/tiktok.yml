name: TikTok Scraper

permissions:
  contents: write
  
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Run TikTok scraper
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TIKTOK_SECUID: ${{ secrets.TIKTOK_SECUID }}
        run: |
          python tiktok.py

      - name: Commit cache file if exists
        run: |
          if [ -f last.txt ]; then
            echo "Cache file found. Committing..."
            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"
      
            git add last.txt
            git commit -m "Update cache"
      
            # Fetch latest changes
            git pull --rebase
      
            # Push updated commit
            git push
          else
            echo "Cache file not found. Skipping commit."
          fi

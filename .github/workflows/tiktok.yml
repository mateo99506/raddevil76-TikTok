name: TikTok Scraper

on:
  repository_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Clone repository with PAT
      run: |
        git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git repo
        ls -la repo

    - name: Ensure memory.txt exists
      run: |
        cd repo
        if [ ! -f memory.txt ]; then
          echo "Creating empty memory.txt"
          touch memory.txt
        fi

    - name: Ensure log.txt exists
      run: |
        cd repo
        if [ ! -f log.txt ]; then
          echo "Creating empty log.txt"
          touch log.txt
        fi

    - name: Install Python
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip imagemagick
        python3 -m pip install --upgrade pip
        pip install requests

    - name: Run TikTok scraper
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        cd repo
        python3 tiktok.py

    - name: Commit updated memory.txt to repo
      run: |
        cd repo
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add memory.txt
        git commit -m "Update memory" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git HEAD:main

    - name: Commit updated log.txt to repo
      run: |
        cd repo
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add log.txt
        git commit -m "Update log" || echo "No log changes to commit"
        git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git HEAD:main

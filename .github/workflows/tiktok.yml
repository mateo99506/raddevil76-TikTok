name: Discord Test Message

on:
  schedule:
    - cron: "0 * * * *"   # co 60 minut
  workflow_dispatch:

jobs:
  send-test:
    runs-on: ubuntu-latest

    steps:
      - name: Send Test Message
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
               -d '{"content": "Test"}' \
               "$DISCORD_WEBHOOK"

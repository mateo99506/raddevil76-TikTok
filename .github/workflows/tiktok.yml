name: TikTok Scraper

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # pozwala Pythonowi tworzyć i nadpisywać pliki w repo

    steps:
    - name: Manual checkout (no Node.js)
      run: |
        git clone https://github.com/${GITHUB_REPOSITORY}.git repo
        cd repo
        cp -r . ../
        cd ..

    - name: Install Python manually
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip
        python3 -m pip install --upgrade pip
        pip install requests

    - name: Run TikTok scraper
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python3 tiktok.py

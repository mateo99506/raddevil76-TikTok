name: TikTok Scraper

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    - name: Manual checkout via SSH (no Node.js)
      run: |
        git clone git@github.com:${GITHUB_REPOSITORY}.git repo
        cd repo
        cp -r . ../
        cd ..

    - name: Install Python manually
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip
        python3 -m pip install --upgrade pip
        pip install requests

    - name: Run TikTok scraper
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python3 tiktok.py

    - name: Save memory.txt
      run: |
        if [ -f memory.txt ]; then
          echo "memory.txt found — committing."
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add memory.txt
          git commit -m "Update memory"
          git push
        else
          echo "memory.txt not found — nothing to commit."
        fi
